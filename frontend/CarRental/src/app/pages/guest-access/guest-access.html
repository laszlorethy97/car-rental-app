<div class="wrapper">
    <H3>Car Rental</H3>
    <div class="container">
        <ol class="cars-list">
            <li *ngFor="let car of cars" class="car">
                <div>Car id number: {{car.id}}</div>
                <div>licenseplate: {{car.licensePlate}}</div>
                <div>brand: {{car.brand}}</div>
                <div>model: {{car.model}}</div>
                <div>year: {{car.year}}</div>
                <div>kilometrage: {{car.kilometrage}}</div>
                <div>rentPrice: {{car.rentPrice}}</div>
                <div>carstatus: {{car.carStatus}}</div>
                <button (click)="navigateForm()" class="button">rent car</button>
            </li>
        </ol>
    </div>
</div>
