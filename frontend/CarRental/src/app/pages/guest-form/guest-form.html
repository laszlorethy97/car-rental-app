<div class="wrapper">
  <h3>Get Your Personal Data</h3>
  <form class="form-container" (ngSubmit)="getForm(userForm)" #userForm="ngForm">
    <div>
      <label for="email">Email</label>
      <input class="input" type="email" name="email" id="email" ngModel
             required
             pattern="^[A-Za-z0-9]+@[A-Za-z0-9]+\.[A-Za-z0-9]{1,4}$"
             #email="ngModel">
      <div *ngIf="email.invalid && email.touched" style="color:red">
        Please enter a valid email (e.g., abc123@domain.com)
      </div>
    </div>
    <div>
      <label for="firstname">Firstname</label>
      <input class="input" type="text" name="firstname" id="firstname" ngModel
             required
             pattern="[A-Za-z]+"
             #firstname="ngModel">
      <div *ngIf="firstname.invalid && firstname.touched" style="color:red">
       Only letters without accents are allowed
      </div>
    </div>
    <div>
      <label for="lastname">Lastname</label>
      <input class="input" type="text" name="lastname" id="lastname" ngModel
             required
             pattern="[A-Za-z]+"
             #lastname="ngModel">
      <div *ngIf="lastname.invalid && lastname.touched" style="color:red">
        Only letters without accents are allowed
      </div>
    </div>
    <div>
      <label for="address">Address</label>
      <input class="input" type="text" name="address" id="address" ngModel required #address="ngModel">
      <div *ngIf="address.invalid && address.touched" style="color:red">
        Address is required!
      </div>
    </div>
    <div class="indent">
      <label for="phone">Telephone Number</label>
      <input class="input" type="tel" name="phone" id="phone" ngModel
             required
             pattern="[0-9]{9,11}"
             #phone="ngModel">
      <div *ngIf="phone.invalid && phone.touched" style="color:red">
        Please enter 9-11 digits! (0630367114)
      </div>
    </div>

    <div class="indent">
      <label for="startDate">Start Date</label>
      <input class="input" type="date" name="startDate" id="startDate" ngModel
             required
             #startDate="ngModel">
      <div *ngIf="startDate.invalid && startDate.touched" style="color:red">
        Start Date is required!
      </div>
    </div>
        <div class="indent">
      <label for="endDate">End Date</label>
      <input class="input" type="date" name="endDate" id="endDate" ngModel
             required
             #endDate="ngModel">
      <div *ngIf="endDate.invalid && endDate.touched" style="color:red">
        End Date is required!
      </div>
    </div>
    <div>
      <button class="button" type="submit" [disabled]="userForm.invalid">send</button>
    </div>
  </form>
</div>
