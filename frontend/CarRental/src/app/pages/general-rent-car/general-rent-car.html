<div class="wrapper">
    <H3>Rent</H3>
    <div class="container">
        <div>
            <h1>The car isn't available at this time</h1>
            <div class="times" *ngFor="let time of times"> {{ time.startDate | date:'yyyy-MM-dd' }} - {{ time.endDate | date:'yyyy-MM-dd' }}</div>
        </div>
        <form class="form-container" (ngSubmit)="getForm(userForm)" #userForm="ngForm">
            <div>
                <label for="startDate">Start Date</label>
                <input class="input" type="date" name="startDate" id="startDate" ngModel required #startDate="ngModel">
                <div *ngIf="startDate.invalid && startDate.touched" style="color:red">
                    Start date is required!
                </div>
            </div>
            <div>
                <label for="endDate">End Date</label>
                <input class="input" type="date" name="endDate" id="endDate" ngModel required #endDate="ngModel">
                <div *ngIf="endDate.invalid && (endDate.touched || userForm.submitted)" style="color:red">
                    End date is required!
                </div>
            </div>
            <div>
                <button class="button" type="submit" [disabled]="userForm.invalid">Edit</button>
            </div>
        </form>
    </div>
</div>
